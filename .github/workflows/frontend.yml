name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'apps/frontend/package.json'
        continue-on-error: true

      - name: Install dependencies
        run: |
          cd apps/frontend
          if [ -f package.json ]; then npm install; fi
        continue-on-error: true

      - name: Lint and build
        run: |
          cd apps/frontend
          if [ -f package.json ]; then npm run build --if-present; fi
        continue-on-error: true
