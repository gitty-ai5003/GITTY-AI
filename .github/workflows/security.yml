name: Security Scans

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bandit:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -x ./tests,./apps/auth-service/node_modules -ll --exit-zero

  npm-audit:
    name: NPM Audit Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run audit in auth-service
        run: |
          cd apps/auth-service
          if [ -f package.json ]; then
            npm audit --audit-level=high || true
          fi
