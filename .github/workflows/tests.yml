name: Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov mock pydantic structlog dependency-injector fastapi uvicorn httpx pika redis qdrant-client neo4j alembic

      - name: Run Python tests
        run: |
          pytest

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Node.js tests
        run: |
          cd apps/auth-service
          if [ -f package.json ]; then
            npm install
            npm test --if-present
          fi
        continue-on-error: true
