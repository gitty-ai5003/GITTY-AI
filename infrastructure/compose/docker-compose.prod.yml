version: '3.8'

services:
  api-gateway:
    image: gitty-api-gateway:latest
    container_name: gitty-api-gateway
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=gitty_password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    depends_on:
      - redis
      - rabbitmq
      - neo4j
      - qdrant

  auth-service:
    image: gitty-auth-service:latest
    container_name: gitty-auth-service
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    depends_on:
      - redis

  worker:
    image: gitty-worker:latest
    container_name: gitty-worker
    restart: always
    environment:
      - ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=gitty_password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LOG_LEVEL=info
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
    depends_on:
      - redis
      - rabbitmq
