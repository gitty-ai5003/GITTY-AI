# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = apps/api-gateway/alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file as
# well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for local time
# timezone =

# max length of characters to clone to slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported that are relative to the
# directory containing the alembic.ini file
# prepend_sys_path = false

# xpath to config value
# version_locations = %(here)s/bar:%(here)s/bat

# version path separator; defaults to ';'
# version_path_separator = ;

# set to 'true' to search for version files recursively
# recursive_version_locations = false

# set to 'true' to write version files to the version location
# version_file_inherits_from = 

# the database URL
sqlalchemy.url = sqlite:///gitty_graph.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
